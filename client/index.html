<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>WatchStore</title>

    <link rel="stylesheet" href="toast.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#f5f5f7] text-black">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">

        <div class="max-w-7xl mx-auto flex justify-between items-center px-8 py-5">

            <h1 class="text-3xl font-bold tracking-tight">
                 WatchStore
            </h1>

            <div class="flex items-center gap-6">

                <input
                    id="search"
                    type="text"
                    placeholder="Search Apple Watch..."
                    class="border rounded-full px-5 py-2 w-72 focus:outline-none"
                />

                <!-- Sort Dropdown -->
                <select
                    id="sort"
                    class="border rounded-full px-5 py-2 focus:outline-none">

                    <option value="default">
                        Sort By
                    </option>

                    <option value="low-high">
                        Price: Low → High
                    </option>

                    <option value="high-low">
                        Price: High → Low
                    </option>

                    <option value="rating">
                        Rating
                    </option>

                </select>

                <a href="login.html" class="hover:text-gray-500">
                    Login
                </a>

                <a
                    href="register.html"
                    class="hover:text-gray-500">
                    Register
                </a>

                <a
                    href="cart.html"
                    class="bg-black text-white px-5 py-2 rounded-full">
                    🛒 Cart
                    <span id="cart-count">(0)</span>
                </a>

            </div>

        </div>

    </nav>

    <!-- Hero Section -->
    <section class="max-w-7xl mx-auto px-8 py-20 flex justify-between items-center">

        <div>

            <h1 class="text-6xl font-bold leading-tight">
                Apple Watch
                <br>
                Collection
            </h1>

            <p class="text-gray-500 mt-6 text-xl">
                Power. Style. Health. Everything on your wrist.
            </p>

            <button class="mt-10 bg-black text-white px-8 py-4 rounded-full">
                Shop Now
            </button>

        </div>

        <img
            src="/images/1.jpg"
            class="w-[450px]"
        >

    </section>

    <!-- Products -->
    <div class="max-w-7xl mx-auto px-8">

        <h2 class="text-4xl font-bold mb-10">
            Featured Watches
        </h2>

        <div
            id="product-list"
            class="grid lg:grid-cols-4 md:grid-cols-2 gap-8">
        </div>

    </div>

    <!-- Pagination -->
    <div class="flex justify-center items-center gap-6 mt-10 mb-10">

        <button
            id="prev-btn"
            class="px-4 py-2 bg-black text-white rounded">
            Previous
        </button>

        <span id="page-info"></span>

        <button
            id="next-btn"
            class="px-4 py-2 bg-black text-white rounded">
            Next
        </button>

    </div>

    <script src="toast.js"></script>
    <script src="script.js"></script>

</body>

</html>
