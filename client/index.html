<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSphere</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body{
            background:linear-gradient(135deg,#09090b,#18181b,#27272a);
        }

        .glass{
            backdrop-filter:blur(16px);
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,.08);
        }
    </style>

</head>

<body class="min-h-screen text-white">

<!-- ================= NAVBAR ================= -->

<nav class="glass flex justify-between items-center px-10 py-5 sticky top-0">

    <h1 class="text-3xl font-bold tracking-wide">
        🛒 ShopSphere
    </h1>

    <div id="auth-section" class="flex gap-6 items-center">

        <a
        href="login.html"
        class="hover:text-blue-400 duration-200">
            Login
        </a>

        <a
        href="register.html"
        class="hover:text-blue-400 duration-200">
            Register
        </a>

    </div>

</nav>

<!-- ================= HERO ================= -->

<section class="text-center mt-12">

<h2 class="text-5xl font-bold">

Welcome to ShopSphere

</h2>

<p class="text-gray-400 mt-4">

Modern shopping built using Node.js, MongoDB, JWT & Redis

</p>

</section>

<!-- ================= MAIN ================= -->

<div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8 mt-14 px-8">

<!-- PRODUCTS -->

<div class="lg:col-span-2">

<h2 class="text-3xl font-bold mb-6">

Products

</h2>

<div
id="product-list"
class="grid md:grid-cols-2 gap-5">

</div>

</div>

<!-- CART -->

<div>

<div class="glass rounded-2xl p-6 sticky top-28">

<h2 class="text-3xl font-bold mb-6">

🛍 Cart

</h2>

<div id="cart-items">

<p
id="empty-cart"
class="text-gray-400">

Your cart is empty.

</p>

</div>

<div
id="cart-total"
class="hidden mt-6">

<p class="text-xl">

Total :
<span
id="total-price"
class="font-bold text-green-400">

0.00

</span>

</p>

<button
id="checkout-btn"
class="mt-5 w-full bg-green-600 hover:bg-green-700 rounded-xl py-3 font-semibold transition">

Checkout

</button>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
