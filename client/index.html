<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col justify-center items-center min-h-screen bg-black">
    <div class="bg-zinc-900 p-6 rounded-lg w-80">
        <h1 class="text-3xl font-bold text-white mb-4">Products</h1>
        <div id="product-list"></div>
    </div>  
    <h2 class="text-2xl font-bold text-white mt-6 mb-2 ">shopping cart</h2>
    <div id="cart-items">
        <p class="text-white" id="empty-cart">Your card is empty.</p>
    </div>
    <div id="cart-total" class="hidden text-white">
        <p class="text-white">total: <span id="total-price">$0.00</span></p>
        <button id="checkout-btn" class="bg-gray-500 rounded-lg p-4 mt-2">Checkout</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
