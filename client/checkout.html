<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#f5f5f7]">

<div class="max-w-6xl mx-auto py-12">

<h1 class="text-5xl font-bold mb-10">

Checkout

</h1>

<div class="grid lg:grid-cols-2 gap-10">

<!-- LEFT -->

<div class="bg-white rounded-3xl shadow-xl p-8">

<h2 class="text-3xl font-bold mb-8">

Shipping Address

</h2>

<form id="checkout-form" class="space-y-5">

<input
id="fullname"
type="text"
placeholder="Full Name"
class="w-full border rounded-xl p-4"
required>

<input
id="phone"
type="text"
placeholder="Phone Number"
class="w-full border rounded-xl p-4"
required>

<textarea
id="address"
placeholder="Address"
class="w-full border rounded-xl p-4 h-32"
required></textarea>

<input
id="city"
type="text"
placeholder="City"
class="w-full border rounded-xl p-4"
required>

<input
id="state"
type="text"
placeholder="State"
class="w-full border rounded-xl p-4"
required>

<input
id="pincode"
type="text"
placeholder="Pincode"
class="w-full border rounded-xl p-4"
required>

</form>

</div>

<!-- RIGHT -->

<div class="bg-white rounded-3xl shadow-xl p-8">

<h2 class="text-3xl font-bold mb-8">

Order Summary

</h2>

<div id="summary">

Loading...

</div>

<button
id="place-order"
class="mt-8 w-full bg-black text-white py-4 rounded-full">

Place Order

</button>

</div>

</div>

</div>

<script src="checkout.js"></script>

</body>

</html>
