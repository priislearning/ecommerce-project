<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#f5f5f7]">

<div class="min-h-screen grid lg:grid-cols-2">

<div class="hidden lg:flex items-center justify-center bg-white">

<img
src="/images/2.jpg"
class="w-[500px] object-contain"
>

</div>

<div class="flex items-center justify-center">

<div class="bg-white shadow-xl rounded-3xl p-10 w-[430px]">

<h1 class="text-4xl font-bold">
Create Account
</h1>

<p class="text-gray-500 mt-2 mb-8">
Join WatchStore today.
</p>

<form id="register-form" class="space-y-5">

<input
id="name"
type="text"
placeholder="Full Name"
required
class="w-full border rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-black"
/>

<input
id="email"
type="email"
placeholder="Email"
required
class="w-full border rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-black"
/>

<input
id="password"
type="password"
placeholder="Password"
required
class="w-full border rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-black"
/>

<button
class="w-full bg-black text-white py-4 rounded-2xl hover:bg-gray-800 transition">
Create Account
</button>

</form>

<p class="text-center mt-8">

Already have an account?

<a href="login.html" class="font-semibold">
Login
</a>

</p>

</div>

</div>

</div>

<script src="auth.js"></script>

</body>
</html>
