<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ShopSphere | Register</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:linear-gradient(-45deg,#0f172a,#1e1b4b,#111827,#312e81);
background-size:400% 400%;
animation:bg 12s ease infinite;
}

@keyframes bg{

0%{background-position:0% 50%;}

50%{background-position:100% 50%;}

100%{background-position:0% 50%;}

}

.glass{

backdrop-filter:blur(18px);

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.12);

}

</style>

</head>

<body class="min-h-screen flex justify-center items-center">

<div class="glass w-[420px] p-10 rounded-3xl shadow-2xl">

<h1 class="text-4xl font-bold text-center text-white">

✨ Join ShopSphere

</h1>

<p class="text-center text-gray-300 mt-2 mb-8">

Create your shopping account.

</p>

<form id="register-form" class="space-y-5">

<input

id="name"

type="text"

placeholder="👤 Name"

required

class="w-full rounded-xl p-4 bg-gray-900/70 text-white border border-gray-700 focus:border-purple-500 outline-none"
/>

<input

id="email"

type="email"

placeholder="📧 Email"

required

class="w-full rounded-xl p-4 bg-gray-900/70 text-white border border-gray-700 focus:border-purple-500 outline-none"
/>

<input

id="password"

type="password"

placeholder="🔒 Password"

required

class="w-full rounded-xl p-4 bg-gray-900/70 text-white border border-gray-700 focus:border-purple-500 outline-none"
/>

<button

class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:scale-105 transition rounded-xl p-4 text-white font-semibold">

Create Account →

</button>

</form>

<p class="text-center text-gray-300 mt-7">

Already have an account?

<a

href="login.html"

class="text-purple-400 hover:text-purple-300">

Login

</a>

</p>

</div>

<script src="auth.js"></script>

</body>
</html>
